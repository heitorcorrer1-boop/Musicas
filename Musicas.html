<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="musicas.js"></script>
    <title>Biblioteca de Músicas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="search-box">
        <input type="text" id="busca" placeholder="Pesquisar música, artista ou álbum...">
        <button id="btnAbrirModal" class="btn-add">+</button>
    </div>

    <div class="container" id="container"></div>

    <div id="meuModal" class="modal">
        <div class="modal-content">
            <span class="fechar">&times;</span>
            <h2>Nova Música</h2>
            <form id="formMusica">
                <input type="text" id="nome_form" placeholder="Nome da Música" required>
                <input type="text" id="artista_form" placeholder="Artista/Banda" required>
                <input type="text" id="album_form" placeholder="Álbum">
                <input type="number" id="ano_form" placeholder="Ano de Lançamento">
                <input type="text" id="foto_form" placeholder="URL da Imagem de Capa">
                <button type="submit" class="btn-salvar">Salvar</button>
            </form>
        </div>
    </div>

    <div id="modalEditar" class="modal">
        <div class="modal-content" style="border-top: 4px solid #1db954;">
            <span class="fechar" id="fecharEditar">&times;</span>
            <h2>Editar Música</h2>
            
            <form id="formEditarMusica">
                <input type="hidden" id="edit_id">
                <input type="text" id="edit_nome" placeholder="Nome da Música" required>
                <input type="text" id="edit_artista" placeholder="Artista/Banda" required>
                <input type="text" id="edit_album" placeholder="Álbum">
                <input type="number" id="edit_ano" placeholder="Ano de Lançamento">
                <input type="text" id="edit_foto" placeholder="URL da Imagem de Capa">
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="submit" class="btn-salvar" style="flex: 3;">Salvar Alterações</button>
                    <button type="button" id="btnExcluir" class="btn-excluir" style="flex: 1;">🗑️</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
